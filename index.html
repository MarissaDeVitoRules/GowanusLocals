<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>There's no such thing as an Industry Plant 🌱</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&display=swap" rel="stylesheet">
<style>
  :root {
    --black: #0a0a0a; --white: #f5f2ee; --accent: #e8471c; --accent2: #f7b731;
    --muted: #7a7469; --border: rgba(245,242,238,0.1);
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--black); color: var(--white); font-family: 'DM Sans', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header { position: relative; padding: 40px 48px 32px; border-bottom: 1px solid var(--border); overflow: hidden; }
  header::before { content: ''; position: absolute; inset: 0; pointer-events: none;
    background: radial-gradient(ellipse 70% 80% at 10% 50%, rgba(232,71,28,0.12) 0%, transparent 60%),
                radial-gradient(ellipse 40% 60% at 90% 20%, rgba(247,183,49,0.06) 0%, transparent 50%); }
  .header-eyebrow { font-size: 11px; font-weight: 500; letter-spacing: 0.25em; text-transform: uppercase; color: var(--accent); margin-bottom: 12px; display: flex; align-items: center; gap: 10px; }
  .header-eyebrow::before { content: ''; display: inline-block; width: 28px; height: 2px; background: var(--accent); }
  h1 { font-family: 'Bebas Neue', sans-serif; font-size: clamp(36px, 5vw, 72px); line-height: 0.9; letter-spacing: 0.02em; margin-bottom: 14px; }
  h1 span { color: var(--accent); }
  .header-sub { font-size: 13px; font-weight: 300; color: var(--muted); max-width: 500px; line-height: 1.6; }
  .header-count { position: absolute; right: 48px; top: 40px; font-family: 'Bebas Neue', sans-serif; font-size: 80px; color: rgba(255,255,255,0.03); line-height: 1; pointer-events: none; user-select: none; }

  /* FILTER */
  .filter-section { padding: 18px 48px; border-bottom: 1px solid var(--border); display: flex; flex-direction: column; gap: 10px; position: sticky; top: 0; z-index: 100; background: rgba(10,10,10,0.95); backdrop-filter: blur(16px); }
  .filter-row { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .filter-label { font-size: 10px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--muted); font-weight: 500; white-space: nowrap; min-width: 52px; flex-shrink: 0; }
  .filter-pills { display: flex; gap: 5px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex: 1; min-width: 0; padding-bottom: 2px; }
  .filter-pills::-webkit-scrollbar { display: none; }
  .pill { padding: 5px 12px; border-radius: 100px; font-size: 11px; font-weight: 400; cursor: pointer; transition: all 0.15s ease; border: 1px solid var(--border); background: transparent; color: var(--muted); white-space: nowrap; flex-shrink: 0; }
  .pill:hover { border-color: rgba(245,242,238,0.3); color: var(--white); }
  .pill.active { color: #fff; }
  /* tag colours */
  .pill[data-tag="community"].active     { background:#e8471c; border-color:#e8471c; }
  .pill[data-tag="advocacy"].active      { background:#c47a1a; border-color:#c47a1a; }
  .pill[data-tag="safety"].active        { background:#2d9a6c; border-color:#2d9a6c; }
  .pill[data-tag="audio"].active         { background:#7040c0; border-color:#7040c0; }
  .pill[data-tag="live"].active          { background:#c0407a; border-color:#c0407a; }
  .pill[data-tag="mentalhealth"].active  { background:#5a3fa0; border-color:#5a3fa0; }
  .pill[data-tag="education"].active     { background:#6a8a20; border-color:#6a8a20; }
  .pill[data-tag="mentorship"].active    { background:#c47a1a; border-color:#c47a1a; }
  .pill[data-tag="profdev"].active       { background:#1a7ac4; border-color:#1a7ac4; }
  .pill[data-tag="resource"].active      { background:#555; border-color:#555; }
  .pill[data-tag="women"].active         { background:#b84470; border-color:#b84470; }
  .pill[data-tag="nonbinary"].active     { background:#4a7ec4; border-color:#4a7ec4; }
  .pill[data-tag="queer"].active         { background:#8c44b8; border-color:#8c44b8; }
  .pill[data-tag="trans"].active         { background:#2d9abf; border-color:#2d9abf; }
  .pill[data-tag="lgbtq"].active         { background:#6b3fb4; border-color:#6b3fb4; }
  .pill[data-tag="bipoc"].active         { background:#9a3d2d; border-color:#9a3d2d; }
  .pill[data-tag="disability"].active    { background:#3d7a5a; border-color:#3d7a5a; }
  .pill[data-tag="student"].active       { background:#9a6e2d; border-color:#9a6e2d; }
  .pill[data-tag="parenting"].active     { background:#b48b2d; border-color:#b48b2d; }
  .pill[data-tag="all"].active           { background:rgba(245,242,238,0.12); border-color:rgba(245,242,238,0.25); color:var(--white); }

  /* SEARCH */
  .search-wrap { position: relative; flex-shrink: 0; margin-left: auto; }
  .search-wrap svg { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); width: 13px; height: 13px; stroke: var(--muted); }
  #search { background: rgba(255,255,255,0.04); border: 1px solid var(--border); border-radius: 100px; padding: 6px 14px 6px 30px; color: var(--white); font-family: 'DM Sans', sans-serif; font-size: 12px; width: 190px; outline: none; transition: border-color 0.2s; }
  #search::placeholder { color: var(--muted); }
  #search:focus { border-color: rgba(245,242,238,0.3); }

  /* RESULTS */
  .results-bar { padding: 14px 48px; display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 8px; }
  .results-count { font-size: 12px; color: var(--muted); }
  .results-count strong { color: var(--white); font-weight: 500; }
  .clear-btn { font-size: 11px; color: var(--accent); background: transparent; border: 1px solid rgba(232,71,28,0.3); border-radius: 100px; padding: 4px 12px; cursor: pointer; letter-spacing: 0.05em; transition: all 0.15s; display: none; }
  .clear-btn:hover { background: rgba(232,71,28,0.1); }
  .clear-btn.visible { display: inline-block; }

  /* GRID */
  .grid { padding: 8px 48px 80px; display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 1px; background: var(--border); }

  /* CARD */
  .card { background: var(--black); padding: 26px; display: flex; flex-direction: column; gap: 9px; transition: background 0.2s; position: relative; overflow: hidden; animation: fadeUp 0.35s ease both; }
  .card::before { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 80% 60% at 0% 100%, rgba(232,71,28,0.05) 0%, transparent 60%); opacity: 0; transition: opacity 0.3s; pointer-events: none; }
  .card:hover { background: #111; }
  .card:hover::before { opacity: 1; }
  .card-tags-row { display: flex; gap: 5px; flex-wrap: wrap; }
  .ctag { font-size: 9px; letter-spacing: 0.14em; text-transform: uppercase; font-weight: 500; padding: 2px 7px; border-radius: 3px; }
  /* card tag colours match pill colours */
  .ctag-community    { background: rgba(232,71,28,0.12);  color: #e8471c; }
  .ctag-advocacy     { background: rgba(196,122,26,0.12); color: #e09040; }
  .ctag-safety       { background: rgba(45,154,108,0.12); color: #50c890; }
  .ctag-audio        { background: rgba(112,64,192,0.12); color: #9868e0; }
  .ctag-live         { background: rgba(192,64,122,0.12); color: #e07090; }
  .ctag-mentalhealth { background: rgba(90,63,160,0.12);  color: #a080d8; }
  .ctag-education    { background: rgba(106,138,32,0.12); color: #a0c040; }
  .ctag-mentorship   { background: rgba(196,122,26,0.12); color: #e09040; }
  .ctag-profdev      { background: rgba(26,122,196,0.12); color: #50a0e0; }
  .ctag-resource     { background: rgba(120,120,120,0.1); color: #aaa; }
  .ctag-women        { background: rgba(184,68,112,0.1);  color: #e080a8; }
  .ctag-nonbinary    { background: rgba(74,126,196,0.1);  color: #80a8e0; }
  .ctag-queer        { background: rgba(140,68,184,0.1);  color: #c080e0; }
  .ctag-trans        { background: rgba(45,154,191,0.1);  color: #70cce8; }
  .ctag-lgbtq        { background: rgba(107,63,180,0.1);  color: #aa80e0; }
  .ctag-bipoc        { background: rgba(154,61,45,0.1);   color: #d88070; }
  .ctag-disability   { background: rgba(61,122,90,0.1);   color: #70c4a0; }
  .ctag-student      { background: rgba(154,110,45,0.1);  color: #d8a870; }
  .ctag-parenting    { background: rgba(180,139,45,0.1);  color: #e0c070; }

  .card-name { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.04em; color: var(--white); line-height: 1; }
  .card-desc { font-size: 13px; font-weight: 300; color: var(--muted); line-height: 1.6; flex: 1; }
  .card-meta { font-size: 11px; color: var(--accent2); font-style: italic; font-weight: 300; }
  .card-footer { display: flex; align-items: center; justify-content: flex-end; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 2px; }
  .card-link { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; color: var(--white); text-decoration: none; opacity: 0.4; transition: opacity 0.2s; }
  .card-link:hover { opacity: 1; }
  .card-link svg { width: 10px; height: 10px; stroke: currentColor; }

  .empty { grid-column: 1/-1; padding: 80px; text-align: center; color: var(--muted); }
  .empty p { font-size: 15px; font-weight: 300; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }

  footer { border-top: 1px solid var(--border); padding: 24px 48px; display: flex; align-items: center; justify-content: space-between; color: var(--muted); font-size: 12px; flex-wrap: wrap; gap: 8px; }
  footer a { color: var(--accent); text-decoration: none; }

  @media (max-width: 640px) {
    header, .filter-section, .results-bar, .grid, footer { padding-left: 20px; padding-right: 20px; }
    .grid { grid-template-columns: 1fr; }
    .search-wrap { margin-left: 0; width: 100%; }
    #search { width: 100%; }
    .header-count { display: none; }
  }
</style>
</head>
<body>

<header>
  <div class="header-eyebrow">There's no such thing as an Industry Plant 🌱</div>
  <h1>MUSIC<br><span>INDUSTRY</span><br>RESOURCES</h1>
  <p class="header-sub">A curated directory of organizations, communities, collectives, and general resources for everyone.</p>
  <div class="header-count" id="headerCount"></div>
</header>

<div class="filter-section">
  <div class="filter-row">
    <span class="filter-label">Filter</span>
    <div class="filter-pills" id="tagPills">

      <button class="pill" data-tag="mentorship">Mentorship</button>
      <button class="pill" data-tag="profdev">Professional Dev</button>
      <button class="pill" data-tag="resource">Tools & Resources</button>
      <button class="pill" data-tag="women">Women</button>
      <button class="pill" data-tag="nonbinary">Non-Binary</button>
      <button class="pill" data-tag="queer">Queer</button>
      <button class="pill" data-tag="trans">Trans</button>
      <button class="pill" data-tag="lgbtq">LGBTQ+</button>
      <button class="pill" data-tag="bipoc">BIPOC</button>
      <button class="pill" data-tag="disability">Disability</button>
      <button class="pill" data-tag="student">Student</button>
      <button class="pill" data-tag="parenting">Parenting</button>
    </div>
    <div class="search-wrap">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
      </svg>
      <input type="text" id="search" placeholder="Search…">
    </div>
  </div>
</div>

<div class="results-bar">
  <div class="results-count" id="resultsCount"></div>
  <button class="clear-btn" id="clearBtn">✕ Clear filters</button>
</div>

<div class="grid" id="grid"></div>

<footer>
  <span>There's no such thing as an Industry Plant 🌱</span>
  <span>See a mistake? Something to add? <a href="mailto:md@marissadevito.com">Drop us a note</a></span>
</footer>

<script>
// tags: any combination of the filter slugs above — orgs can have as many as needed
const resources = [
  { name:"A2IM (American Association of Independent Music)", url:"https://a2im.org/", desc:"A 501(c)(6) trade organization representing 700+ independent US music labels advocating for independent artists and labels in the marketplace, media, and on Capitol Hill.", tags:["advocacy","community"], note:"" },
  { name:"Alliance for Women Film Composers", url:"https://theawfc.com/", desc:"A community of composers and colleagues supporting and celebrating women composers through advocacy and education across film, TV, video games, and multimedia.", tags:["audio","advocacy","community","women"], note:"" },
  { name:"Amplify Her Voice", url:"https://www.amplifyhervoice.org/", desc:"Championing gender equality in the music industry and advancing women's careers through events, programs, and community.", tags:["advocacy","community","women"], note:"" },
  { name:"Association of Music Producers (AMP)", url:"https://www.ampnow.com/", desc:"Founded in 1998 to educate members and the wider advertising, production, and media communities on all facets of music production through events, resources, and advocacy.", tags:["community","advocacy","profdev"], note:"" },
  { name:"Audio Engineering Society (AES)", url:"https://www.aes.org/", desc:"The only professional society devoted exclusively to audio technology, uniting audio engineers, creative artists, scientists, and students worldwide since 1948.", tags:["audio","community","profdev"], note:"" },
  { name:"B.A.K. Play.Ground", url:"https://www.bigasskids.com/playground", desc:"A membership platform connecting artists, creatives, and music professionals through vetted hiring opportunities, music business education, and community.", tags:["resource","community","profdev"], note:"" },
  { name:"BAK Pitch Perfect", url:"https://bakpitchperfect.org/", desc:"A business community for women entrepreneurs in the music industry — part of the B.A.K. Play.Ground ecosystem — connecting members through shared work opportunities, music business education, and industry dialogue.", tags:["community","profdev","women"], note:"" },
  { name:"BAPAM (British Association for Performing Arts Medicine)", url:"https://www.bapam.org.uk/", desc:"Provides free or low-cost clinical health services for performing artists across the UK, including medical assessments for physical issues like injuries, vocal problems, mental health, hearing, and other work-related health conditions.", tags:["mentalhealth"], note:"UK-based" },
  { name:"Backline", url:"https://backline.care/", desc:"Mental health and wellness resources for music industry professionals and their families.", tags:["mentalhealth","community"], note:"" },
  { name:"Book More Women", url:"https://www.bookmorewomen.com/", desc:"Visualizing and addressing the pervasive gender imbalance at music festivals, tracking progress towards better representation on future lineups.", tags:["advocacy","women"], note:"" },
  { name:"Calling All Crows", url:"https://www.callingallcrows.org/", desc:"Connecting music fans to feminist movements for justice and equality.", tags:["advocacy","community","women","queer","lgbtq"], note:"" },
  { name:"Color of Music Collective", url:"https://www.colorofmusiccollective.com/mission", desc:"Amplifying the voices of people of color and LGBTQ+ individuals working in the music industry.", tags:["community","advocacy","lgbtq","queer","trans","bipoc"], note:"" },
  { name:"Diversify the Stage", url:"https://www.diversifythestage.org/", desc:"A 501(c)3 providing greater access to careers in live music, events, and touring for historically marginalized and underrepresented communities.", tags:["live","advocacy","community","women","nonbinary","lgbtq","bipoc"], note:"" },
  { name:"ECCHO Live", url:"https://eccholive.com/", desc:"Human resources for live event professionals. Their All Access program pays for 4 therapy or coaching sessions per year for people who work in live entertainment. All Access Onsite provides free counseling at major festivals and events across the US.", tags:["mentalhealth","live"], note:"" },
  { name:"Entertainment Community Fund", url:"https://entertainmentcommunity.org/", desc:"Provides performing-arts and entertainment professionals with health and wellness support, career and life services, affordable housing, emergency financial assistance, and other social services. Formerly The Actors Fund.", tags:["mentalhealth","resource"], note:"" },
  { name:"EqualizeHer", url:"https://www.equalizeher.org/", desc:"An initiative to achieve equal representation of women across all aspects of the music industry — from recording studios to stages to board rooms.", tags:["advocacy","women"], note:"" },
  { name:"Family Alliance in Music (FAM)", url:"https://www.familyallianceinmusic.org/", desc:"An organization dedicated to supporting music industry professionals who are also parents and caregivers, providing resources, community, and advocacy for family-friendly workplaces in music.", tags:["advocacy","community","parenting"], note:"" },
  { name:"Female Composer Safety League", url:"https://www.femalecomposersafetyleague.org/", desc:"Providing visibility, safety, advancement, and empowerment of women with a trauma-informed space for victims of sexual abuse in the music composing industry.", tags:["safety","advocacy","women"], note:"" },
  { name:"Femme House", url:"https://www.thisisfemmehouse.com/", desc:"Creating a more equitable industry for femme and gender expansive music producers and DJs.", tags:["community","advocacy","audio","women","nonbinary","queer","lgbtq"], note:"" },
  { name:"Femme It Forward", url:"https://www.femmeitforward.com/", desc:"A female-led music and entertainment company celebrating, educating, and empowering women through concerts, tours, festivals, comedy shows, and more.", tags:["live","community","women"], note:"" },
  { name:"Future of Music Coalition", url:"https://www.futureofmusic.org/about", desc:"A D.C.-based nonprofit supporting a musical ecosystem where artists flourish and are compensated fairly and transparently for their work.", tags:["advocacy","resource"], note:"" },
  { name:"Gender Amplified", url:"https://www.genderamplified.org/", desc:"A 501c3 non-profit empowering women and gender-expansive music producers by inspiring the next generation of audio professionals.", tags:["audio","community","advocacy","women","nonbinary"], note:"" },
  { name:"Gender Amplified Mentorship", url:"https://www.genderamplified.org/", desc:"Mentorship and professional development for women and gender-expansive music producers, connecting emerging audio professionals with established mentors in the production and engineering space.", tags:["mentorship","audio","women","nonbinary"], note:"" },
  { name:"Girl Be Heard", url:"https://girlbeheard.org/", desc:"Building leaders, change-makers, and activists through amplifying the voices of girls and young women via socially conscious theater-making and performance.", tags:["advocacy","community","education","women"], note:"" },

  { name:"Girls Behind the Rock Show", url:"https://www.instagram.com/girlsbtrs/", desc:"501(c)(3) Non-Profit helping advance women and marginalized genders in the music industry through education and hands-on opportunities.", tags:["education","community","women","nonbinary"], note:"" },
  { name:"Girls Who Listen", url:"https://www.girlswholisten.org/", desc:"Supporting future female creatives and executives within the music industry.", tags:["community","advocacy","women"], note:"" },
  { name:"Grammy U", url:"https://www.recordingacademy.com/membership/grammy-u", desc:"Recording Academy program for college students pursuing careers in the music industry.", tags:["education","profdev","student"], note:"" },
  { name:"Grammy U Mentorship Program", url:"https://www.recordingacademy.com/membership/grammy-u", desc:"Annual 6-month one-on-one program pairing college students with Recording Academy voting members across tracks including Producing & Engineering, Performance, Songwriting, Music Business, and Entertainment Law.", tags:["mentorship","education","student"], note:"Presented by Amazon Music" },

  { name:"Live Out L!ve Foundation", url:"https://www.liveoutlive.com/lol-foundation", desc:"A 501C3 organization amplifying commitment to open doors and set the stage for the next generation of diverse talent.", tags:["live","community","advocacy","women","lgbtq"], note:"" },
  { name:"Lone Wolves Club", url:"https://lonewolvesclub.co/", desc:"A 501(c)(3) nonprofit community for music, tech, and entertainment professionals — born from disruption, built on connection. Turns isolation into collaboration by fostering skill-building and opportunity.", tags:["community","profdev"], note:"" },
  { name:"Maestra Music Mentorship", url:"https://maestramusic.org/mentorship/", desc:"A 6-month program connecting early-career mentees (21+) interested in making music for theatre with professional women and nonbinary people currently working in the field.", tags:["mentorship","women","nonbinary"], note:"Applications open annually" },

  { name:"MINT Talent Group Women's Mentorship", url:"https://www.minttalentgroup.com/mentorship", desc:"Virtual mentorship program creating a safe space for women and nonbinary leaders in live music, designed to empower future leaders through open dialogue and education around live touring topics.", tags:["mentorship","live","women","nonbinary","lgbtq"], note:"Ages 18+" },
  { name:"Minding Creative Minds", url:"https://mindingcreativeminds.ie/", desc:"Irish organization offering free, confidential 24/7 mental health, wellbeing, legal, financial, career, and counselling support services to people working in the creative industries.", tags:["mentalhealth","resource"], note:"Ireland-based" },

// ─── STATE ────────────────────────────────────────────────────────────────────
let activeTags  = new Set();
let searchQuery = "";

// ─── RENDER ───────────────────────────────────────────────────────────────────
const tagLabels = {
  community:"Community", advocacy:"Advocacy", safety:"Safety",
  audio:"Audio & Production", live:"Live & Events", mentalhealth:"Mental Health",
  education:"Education", mentorship:"Mentorship", profdev:"Professional Dev",
  resource:"Tools & Resources", women:"Women", nonbinary:"Non-Binary",
  queer:"Queer", trans:"Trans", lgbtq:"LGBTQ+", bipoc:"BIPOC",
  disability:"Disability", student:"Student", parenting:"Parenting"
};

function buildCards() {
  const grid = document.getElementById("grid");
  grid.innerHTML = "";
  const q = searchQuery.toLowerCase();

  const filtered = resources.filter(r => {
    const matchTags = activeTags.size === 0 || [...activeTags].every(t => r.tags.includes(t));
    const matchSearch = !q || r.name.toLowerCase().includes(q) || r.desc.toLowerCase().includes(q);
    return matchTags && matchSearch;
  });

  const count = filtered.length;
  document.getElementById("resultsCount").innerHTML = `<strong>${count}</strong> organization${count !== 1 ? "s" : ""}`;
  document.getElementById("headerCount").textContent = count;
  document.getElementById("clearBtn").classList.toggle("visible", activeTags.size > 0 || !!searchQuery);

  if (count === 0) {
    grid.innerHTML = `<div class="empty"><p>No results — try removing a filter.</p></div>`;
    return;
  }

  filtered.forEach((r, i) => {
    const card = document.createElement("div");
    card.className = "card";
    card.style.animationDelay = `${Math.min(i, 20) * 20}ms`;
    const tagsHTML = r.tags.map(t => tagLabels[t] ? `<span class="ctag ctag-${t}">${tagLabels[t]}</span>` : "").join("");
    card.innerHTML = `
      <div class="card-tags-row">${tagsHTML}</div>
      <div class="card-name">${r.name}</div>
      <p class="card-desc">${r.desc}</p>
      ${r.note ? `<div class="card-meta">${r.note}</div>` : ""}
      ${r.url ? `<div class="card-footer"><a class="card-link" href="${r.url}" target="_blank" rel="noopener">Visit <svg viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg></a></div>` : ""}
    `;
    grid.appendChild(card);
  });
}

function syncPills() {
  document.querySelectorAll("#tagPills .pill").forEach(p => {
    const t = p.dataset.tag;
    if (t === "all") p.classList.toggle("active", activeTags.size === 0);
    else p.classList.toggle("active", activeTags.has(t));
  });
}

// ─── EVENTS ───────────────────────────────────────────────────────────────────
document.getElementById("tagPills").addEventListener("click", e => {
  const btn = e.target.closest("[data-tag]"); if (!btn) return;
  const t = btn.dataset.tag;
  if (t === "all") { activeTags.clear(); }
  else { activeTags.has(t) ? activeTags.delete(t) : activeTags.add(t); }
  syncPills(); buildCards();
});

document.getElementById("clearBtn").addEventListener("click", () => {
  activeTags.clear(); searchQuery = "";
  document.getElementById("search").value = "";
  syncPills(); buildCards();
});

let debounce;
document.getElementById("search").addEventListener("input", e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { searchQuery = e.target.value; buildCards(); }, 150);
});

// ─── INIT ─────────────────────────────────────────────────────────────────────
syncPills();
buildCards();
</script>
